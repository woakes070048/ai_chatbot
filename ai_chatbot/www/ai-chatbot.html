<!DOCTYPE html>
<html lang="en" data-theme="{{ desk_theme }}" data-theme-mode="{{ desk_theme }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ frappe.session.csrf_token }}">
    <title>AI Chatbot - ERPNext Assistant</title>
    <link rel="icon" type="image/svg+xml" href="/assets/ai_chatbot/frontend/favicon.png">
    <link rel="stylesheet" href="/assets/ai_chatbot/frontend/assets/main.css">
    <script>
        // Make CSRF token and site name available globally
        window.csrf_token = "{{ frappe.session.csrf_token }}";
        window.site_name = "{{ site_name }}";
    </script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        #app {
            width: 100%;
            height: 100vh;
        }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #666;
            flex-direction: column;
            gap: 16px;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading">
            <div class="spinner"></div>
            <div>Loading AI Chatbot...</div>
        </div>
    </div>
    <script type="module" src="/assets/ai_chatbot/frontend/assets/main.js"></script>
</body>
</html>
