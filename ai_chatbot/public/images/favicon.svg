<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main gradient -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- Secondary / highlight gradient -->
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>

    <!-- Stronger shadow filter (for icon) -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18" result="blur"/>
      <feOffset in="blur" dx="10" dy="16" result="offsetBlur"/>
      <feFlood flood-color="#4c1d95" flood-opacity="0.60" result="flood"/>
      <feComposite in="flood" in2="offsetBlur" operator="in" result="composite"/>
      <feMerge>
        <feMergeNode in="composite"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle inner glow for orb -->
    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over"/>
    </filter>

    <!-- Text glow (violet-pink neon) -->
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur1"/>
      <feGaussianBlur in="blur1" stdDeviation="14" result="blur2"/>
      <feFlood flood-color="#c084fc" flood-opacity="0.75" result="color1"/>
      <feComposite in="color1" in2="blur1" operator="in" result="glow1"/>
      <feComposite in="color1" in2="blur2" operator="in" result="glow2"/>
      <feMerge>
        <feMergeNode in="glow2"/>
        <feMergeNode in="glow1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- No background = transparent -->

  <!-- Main orbital core with shadow -->
  <g filter="url(#shadow)" transform="translate(256,220) scale(1.45)">
    <!-- Outer gradient orb -->
    <circle cx="0" cy="0" r="68" fill="url(#g1)" filter="url(#innerGlow)" opacity="0.97"/>
    <!-- Inner cutout -->
    <circle cx="0" cy="0" r="52" fill="#0f0f1a"/>

    <!-- Colored typing/thinking dots -->
    <circle cx="-24" cy="0" r="12" fill="#ff9999"/> <!-- light red -->
    <circle cx="0" cy="0" r="12" fill="#99ccff"/>   <!-- light blue -->
    <circle cx="24" cy="0" r="12" fill="#99ff99"/>   <!-- light green -->

    <!-- Small tail -->
    <path d="M-42 42 L -68 68 L -42 78 Z" fill="url(#g1)" opacity="0.92"/>
  </g>

  <!-- Orbiting accent dot -->
  <g transform="translate(256,220) rotate(35)">
    <circle cx="110" cy="0" r="10" fill="#fdd365" opacity="0.88"/>
  </g>

  <!-- "AI" text – futuristic font + glow effect
  <text
    x="256" y="390"
    font-family="Orbitron, Exo, Rajdhani, sans-serif"
    font-size="68"
    font-weight="900"
    fill="#6c3b8e"
    text-anchor="middle"
    letter-spacing="1.2"
    filter="url(#textGlow)"
  >
    AI
  </text>
  -->
</svg>
