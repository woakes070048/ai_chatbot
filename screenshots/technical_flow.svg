<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 2000" width="1400" height="2000">
  <defs>
    <style>
      .start { fill: #ef4444; stroke: #dc2626; stroke-width: 2; }
      .process { fill: #3b82f6; stroke: #1e40af; stroke-width: 2; }
      .decision { fill: #f59e0b; stroke: #d97706; stroke-width: 2; }
      .data { fill: #8b5cf6; stroke: #6d28d9; stroke-width: 2; }
      .api { fill: #10b981; stroke: #059669; stroke-width: 2; }
      .end { fill: #6366f1; stroke: #4f46e5; stroke-width: 2; }
      .text { fill: white; font-family: Arial, sans-serif; font-size: 13px; text-anchor: middle; font-weight: 600; }
      .small-text { fill: white; font-family: Arial, sans-serif; font-size: 10px; text-anchor: middle; }
      .title { fill: #1e293b; font-family: Arial, sans-serif; font-size: 26px; font-weight: bold; text-anchor: middle; }
      .subtitle { fill: #475569; font-family: Arial, sans-serif; font-size: 14px; text-anchor: middle; }
      .label { fill: #1e293b; font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; }
      .note { fill: #64748b; font-family: Arial, sans-serif; font-size: 9px; }
    </style>
  </defs>
  
  <!-- Title -->
  <text x="700" y="35" class="title">Detailed Technical Flow: Message Processing</text>
  <text x="700" y="60" class="subtitle">Complete System Interaction - All Steps Documented</text>
  
  <!-- Start -->
  <ellipse cx="700" cy="100" rx="90" ry="30" class="start"/>
  <text x="700" y="105" class="text">USER CLICKS SEND</text>
  
  <!-- Layer 1: Frontend -->
  <rect x="50" y="150" width="1300" height="180" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="700" y="170" class="label" font-size="14">FRONTEND LAYER (Vue.js)</text>
  
  <rect x="550" y="190" width="300" height="50" rx="6" class="process"/>
  <text x="700" y="210" class="text">1. Event Handler Triggered</text>
  <text x="700" y="227" class="small-text">onClick / onKeyPress (Enter)</text>
  
  <line x1="700" y1="240" x2="700" y2="260" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="550" y="260" width="300" height="50" rx="6" class="process"/>
  <text x="700" y="280" class="text">2. Input Validation</text>
  <text x="700" y="297" class="small-text">Check: not empty, trim whitespace</text>
  
  <text x="900" y="285" class="note">validates: message.trim().length &gt; 0</text>
  
  <!-- Layer 2: API Call -->
  <line x1="700" y1="330" x2="700" y2="360" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  
  <rect x="50" y="360" width="1300" height="280" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
  <text x="700" y="380" class="label" font-size="14">API LAYER (Python/Frappe)</text>
  
  <rect x="550" y="400" width="300" height="50" rx="6" class="api"/>
  <text x="700" y="420" class="text">3. HTTP POST Request</text>
  <text x="700" y="437" class="small-text">/api/method/ai_chatbot.api.chat.send_message</text>
  
  <text x="900" y="420" class="note">Payload: {conversation_id, message, stream}</text>
  
  <line x1="700" y1="450" x2="700" y2="470" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="550" y="470" width="300" height="50" rx="6" class="api"/>
  <text x="700" y="490" class="text">4. Authentication Check</text>
  <text x="700" y="507" class="small-text">Validate CSRF token, user session</text>
  
  <line x1="700" y1="520" x2="700" y2="540" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="550" y="540" width="300" height="50" rx="6" class="api"/>
  <text x="700" y="560" class="text">5. Authorization Check</text>
  <text x="700" y="577" class="small-text">conversation.user == frappe.session.user</text>
  
  <text x="900" y="565" class="note">frappe.throw() if unauthorized</text>
  
  <!-- Layer 3: Database Operations -->
  <line x1="700" y1="640" x2="700" y2="670" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  
  <rect x="50" y="670" width="1300" height="220" rx="8" fill="#faf5ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="700" y="690" class="label" font-size="14">DATABASE LAYER (MariaDB)</text>
  
  <rect x="550" y="710" width="300" height="50" rx="6" class="data"/>
  <text x="700" y="730" class="text">6. Save User Message</text>
  <text x="700" y="747" class="small-text">INSERT INTO tabChatbot Message</text>
  
  <text x="100" y="735" class="note">Fields: conversation, role=user, content, timestamp</text>
  
  <line x1="700" y1="760" x2="700" y2="780" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="550" y="780" width="300" height="50" rx="6" class="data"/>
  <text x="700" y="800" class="text">7. Retrieve Conversation History</text>
  <text x="700" y="817" class="small-text">SELECT * FROM tabChatbot Message ORDER BY timestamp</text>
  
  <text x="100" y="805" class="note">Returns: [{role, content}, ...] array</text>
  
  <line x1="700" y1="830" x2="700" y2="850" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Layer 4: AI Provider Configuration -->
  <rect x="550" y="850" width="300" height="50" rx="6" class="api"/>
  <text x="700" y="870" class="text">8. Get AI Provider Config</text>
  <text x="700" y="887" class="small-text">Load API key, model settings</text>
  
  <text x="900" y="875" class="note">OpenAI or Claude based on conversation.ai_provider</text>
  
  <!-- Layer 5: Tools Schema -->
  <line x1="700" y1="900" x2="700" y2="930" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  
  <rect x="50" y="930" width="1300" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="700" y="950" class="label" font-size="14">TOOLS CONFIGURATION</text>
  
  <rect x="550" y="970" width="300" height="50" rx="6" class="api"/>
  <text x="700" y="990" class="text">9. Load Tools Schema</text>
  <text x="700" y="1007" class="small-text">get_all_tools_schema()</text>
  
  <line x1="700" y1="1020" x2="700" y2="1040" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="200" y="1040" width="220" height="70" rx="6" fill="#dcfce7" stroke="#10b981" stroke-width="1"/>
  <text x="310" y="1060" class="small-text" font-weight="bold">Enabled Tools:</text>
  <text x="210" y="1078" class="small-text">• CRM (if enabled)</text>
  <text x="210" y="1093" class="small-text">• Sales (if enabled)</text>
  
  <rect x="480" y="1040" width="220" height="70" rx="6" fill="#dcfce7" stroke="#10b981" stroke-width="1"/>
  <text x="590" y="1060" class="small-text" font-weight="bold">Tools Loaded:</text>
  <text x="490" y="1078" class="small-text">• Stock (if enabled)</text>
  <text x="490" y="1093" class="small-text">• Finance (if enabled)</text>
  
  <rect x="760" y="1040" width="220" height="70" rx="6" fill="#dcfce7" stroke="#10b981" stroke-width="1"/>
  <text x="870" y="1060" class="small-text" font-weight="bold">More Tools:</text>
  <text x="770" y="1078" class="small-text">• Purchase (if enabled)</text>
  <text x="770" y="1093" class="small-text">• HR (if enabled)</text>
  
  <!-- Layer 6: AI API Call -->
  <line x1="700" y1="1130" x2="700" y2="1160" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  
  <rect x="50" y="1160" width="1300" height="120" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="700" y="1180" class="label" font-size="14">AI API CALL (OpenAI/Claude)</text>
  
  <rect x="550" y="1200" width="300" height="60" rx="6" class="api"/>
  <text x="700" y="1220" class="text">10. Call AI API</text>
  <text x="700" y="1240" class="small-text">POST /v1/chat/completions</text>
  
  <text x="100" y="1230" class="note">Body: {model, messages: history, tools: schema, temperature}</text>
  
  <!-- Decision Point -->
  <line x1="700" y1="1280" x2="700" y2="1320" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  
  <path d="M 700 1330 L 800 1380 L 700 1430 L 600 1380 Z" class="decision"/>
  <text x="700" y="1373" class="text" font-size="12">AI Response</text>
  <text x="700" y="1393" class="text" font-size="12">Contains tool_calls?</text>
  
  <!-- NO TOOLS PATH -->
  <line x1="600" y1="1380" x2="400" y2="1380" stroke="#475569" stroke-width="3"/>
  <text x="500" y="1370" class="label">NO</text>
  <text x="500" y="1400" class="note">Simple message: "Hello"</text>
  <line x1="400" y1="1380" x2="400" y2="1500" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  
  <rect x="250" y="1500" width="300" height="60" rx="6" class="process"/>
  <text x="400" y="1523" class="text">11a. Direct Response</text>
  <text x="400" y="1543" class="small-text">content = response['content']</text>
  
  <line x1="400" y1="1560" x2="400" y2="1720" stroke="#475569" stroke-width="3"/>
  
  <!-- TOOLS PATH -->
  <line x1="800" y1="1380" x2="1000" y2="1380" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="900" y="1370" class="label">YES</text>
  <text x="900" y="1400" class="note">Complex query: "Get customers"</text>
  
  <rect x="850" y="1400" width="300" height="60" rx="6" class="data"/>
  <text x="1000" y="1423" class="text">11b. Parse Tool Calls</text>
  <text x="1000" y="1443" class="small-text">tool_calls = response['tool_calls']</text>
  
  <line x1="1000" y1="1460" x2="1000" y2="1490" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="850" y="1490" width="300" height="60" rx="6" class="api"/>
  <text x="1000" y="1513" class="text">12. Execute Tools</text>
  <text x="1000" y="1533" class="small-text">BaseTool.execute_tool(func_name, args)</text>
  
  <text x="1200" y="1520" class="note">Routes to: CRM/Sales/Purchase/etc.</text>
  
  <line x1="1000" y1="1550" x2="1000" y2="1580" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="850" y="1580" width="300" height="60" rx="6" class="data"/>
  <text x="1000" y="1603" class="text">13. Query ERPNext DB</text>
  <text x="1000" y="1623" class="small-text">frappe.get_all() / frappe.db.sql()</text>
  
  <line x1="1000" y1="1640" x2="1000" y2="1670" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="850" y="1670" width="300" height="60" rx="6" class="api"/>
  <text x="1000" y="1693" class="text">14. Second AI Call</text>
  <text x="1000" y="1713" class="small-text">Format tool results into natural language</text>
  
  <line x1="1000" y1="1730" x2="700" y2="1730" stroke="#475569" stroke-width="3"/>
  <line x1="400" y1="1720" x2="700" y2="1720" stroke="#475569" stroke-width="3"/>
  <line x1="700" y1="1720" x2="700" y2="1760" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  
  <!-- Save Response -->
  <rect x="550" y="1760" width="300" height="60" rx="6" class="data"/>
  <text x="700" y="1783" class="text">15. Save Assistant Message</text>
  <text x="700" y="1803" class="small-text">INSERT with content + tool_calls (if any)</text>
  
  <line x1="700" y1="1820" x2="700" y2="1850" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="550" y="1850" width="300" height="50" rx="6" class="api"/>
  <text x="700" y="1870" class="text">16. Update Conversation Stats</text>
  <text x="700" y="1887" class="small-text">message_count, total_tokens, updated_at</text>
  
  <line x1="700" y1="1900" x2="700" y2="1930" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  
  <!-- End -->
  <ellipse cx="700" cy="1970" rx="80" ry="30" class="end"/>
  <text x="700" y="1975" class="text">RESPONSE DISPLAYED</text>
  
  <!-- Legend -->
  <rect x="50" y="20" width="250" height="100" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="175" y="40" class="label" text-anchor="middle">Process Layers:</text>
  <rect x="60" y="50" width="15" height="10" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="85" y="58" class="note">Frontend (Vue.js)</text>
  <rect x="60" y="65" width="15" height="10" fill="#f0fdf4" stroke="#10b981"/>
  <text x="85" y="73" class="note">API Layer (Python)</text>
  <rect x="60" y="80" width="15" height="10" fill="#faf5ff" stroke="#8b5cf6"/>
  <text x="85" y="88" class="note">Database (MariaDB)</text>
  <rect x="60" y="95" width="15" height="10" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="85" y="103" class="note">AI Provider (External)</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#475569"/>
    </marker>
  </defs>
</svg>
