<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1600" width="1400" height="1600">
  <defs>
    <style>
      .schema-box { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; }
      .example-box { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
      .code { fill: #1e293b; font-family: 'Courier New', monospace; font-size: 10px; }
      .title { fill: #1e293b; font-family: Arial, sans-serif; font-size: 26px; font-weight: bold; text-anchor: middle; }
      .label { fill: #1e293b; font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; }
      .note { fill: #475569; font-family: Arial, sans-serif; font-size: 11px; }
    </style>
  </defs>
  
  <text x="700" y="40" class="title">Tool Schema Structure and Usage</text>
  
  <!-- Complete Tool Schema Example -->
  <rect x="50" y="80" width="1300" height="650" rx="8" class="schema-box"/>
  <text x="70" y="110" class="label" font-size="16">Complete Tool Schema Structure</text>
  
  <text x="80" y="145" class="code">{</text>
  <text x="90" y="165" class="code">  "type": "function",  // ⭐ Always "function"</text>
  <text x="90" y="185" class="code">  "function": {</text>
  
  <text x="100" y="210" class="code">    "name": "get_top_customers",  // ⭐ Python method name</text>
  
  <text x="100" y="235" class="code">    "description": "Retrieve the top customers from ERPNext ranked by revenue or order count.</text>
  <text x="120" y="255" class="code">Use this when user asks about: best customers, top clients, highest revenue customers,</text>
  <text x="120" y="275" class="code">most valuable customers, biggest buyers. Returns customer names, total revenue, and</text>
  <text x="120" y="295" class="code">order counts. Can filter by date range.",  // ⭐ Detailed description</text>
  
  <text x="100" y="320" class="code">    "parameters": {  // ⭐ Function arguments definition</text>
  <text x="110" y="340" class="code">      "type": "object",</text>
  <text x="110" y="360" class="code">      "properties": {</text>
  
  <text x="120" y="385" class="code">        "limit": {</text>
  <text x="130" y="405" class="code">          "type": "integer",  // ⭐ Data type</text>
  <text x="130" y="425" class="code">          "description": "Number of customers to return (1-50)",</text>
  <text x="130" y="445" class="code">          "default": 5,  // ⭐ Default if not provided</text>
  <text x="130" y="465" class="code">          "minimum": 1,</text>
  <text x="130" y="485" class="code">          "maximum": 50</text>
  <text x="120" y="505" class="code">        },</text>
  
  <text x="120" y="530" class="code">        "by": {</text>
  <text x="130" y="550" class="code">          "type": "string",</text>
  <text x="130" y="570" class="code">          "enum": ["revenue", "orders"],  // ⭐ Allowed values only</text>
  <text x="130" y="590" class="code">          "description": "'revenue' = sort by total spending, 'orders' = sort by count"</text>
  <text x="120" y="610" class="code">        },</text>
  
  <text x="120" y="635" class="code">        "from_date": {</text>
  <text x="130" y="655" class="code">          "type": "string",</text>
  <text x="130" y="675" class="code">          "format": "date",  // ⭐ Validates as YYYY-MM-DD</text>
  <text x="130" y="695" class="code">          "description": "Filter transactions from this date onwards"</text>
  <text x="120" y="715" class="code">        }</text>
  
  <text x="110" y="740" class="code">      },</text>
  <text x="110" y="760" class="code">      "required": ["by"]  // ⭐ These parameters MUST be provided</text>
  <text x="100" y="780" class="code">    }</text>
  
  <text x="90" y="805" class="code">  }</text>
  <text x="80" y="825" class="code">}</text>
  
  <!-- How AI Uses Schema -->
  <rect x="50" y="760" width="630" height="320" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="3"/>
  <text x="70" y="790" class="label" font-size="14">How AI Uses This Schema</text>
  
  <text x="70" y="825" class="label">1. Description Matching:</text>
  <text x="80" y="845" class="note">User: "Show me best customers"</text>
  <text x="80" y="863" class="code">AI reads: "use this when user asks about best customers..."</text>
  <text x="80" y="881" class="note">→ MATCH! This tool is relevant</text>
  
  <text x="70" y="911" class="label">2. Parameter Extraction:</text>
  <text x="80" y="931" class="note">User: "top 5 customers by revenue"</text>
  <text x="80" y="949" class="code">AI extracts: "top 5" → limit: 5</text>
  <text x="80" y="967" class="code">AI extracts: "by revenue" → by: "revenue"</text>
  <text x="80" y="985" class="code">No date mentioned → from_date: not included</text>
  
  <text x="70" y="1015" class="label">3. Tool Call Generation:</text>
  <text x="80" y="1035" class="code">{</text>
  <text x="90" y="1053" class="code">  "function": {</text>
  <text x="100" y="1071" class="code">    "name": "get_top_customers",</text>
  <text x="100" y="1089" class="code">    "arguments": "{\"limit\":5,\"by\":\"revenue\"}"</text>
  <text x="90" y="1107" class="code">  }</text>
  <text x="80" y="1125" class="code">}</text>
  
  <!-- All Tools Sent -->
  <rect x="720" y="760" width="630" height="320" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
  <text x="740" y="790" class="label" font-size="14">ALL Tools Are Sent to AI</text>
  
  <text x="740" y="825" class="note">Every request includes ALL enabled tool schemas:</text>
  
  <text x="750" y="855" class="code">tools = [</text>
  <text x="760" y="873" class="code">  // CRM Tools (5 functions)</text>
  <text x="760" y="891" class="code">  get_top_customers,</text>
  <text x="760" y="909" class="code">  search_customers,</text>
  <text x="760" y="927" class="code">  get_leads,</text>
  <text x="760" y="945" class="code">  ...</text>
  
  <text x="760" y="973" class="code">  // Selling Tools (4 functions)</text>
  <text x="760" y="991" class="code">  get_sales_orders,</text>
  <text x="760" y="1009" class="code">  search_sales_orders,</text>
  <text x="760" y="1027" class="code">  ...</text>
  
  <text x="760" y="1055" class="code">  // ... 6 more categories</text>
  <text x="760" y="1073" class="code">  // Total: 20+ tool schemas</text>
  <text x="750" y="1091" class="code">]</text>
  
  <!-- Why Send All -->
  <rect x="50" y="1110" width="1300" height="230" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
  <text x="70" y="1140" class="label" font-size="14">Why Send ALL Tools (Not Just Specific Ones)</text>
  
  <text x="70" y="1175" class="label">Reason 1: AI Needs Complete Context</text>
  <text x="80" y="1195" class="note">User might ask: "Compare customers and suppliers" → Needs both CRM and Buying tools</text>
  
  <text x="70" y="1225" class="label">Reason 2: Better Tool Selection</text>
  <text x="80" y="1245" class="note">AI can choose best tool from ALL options, not pre-filtered subset</text>
  
  <text x="70" y="1275" class="label">Reason 3: Zero Performance Cost</text>
  <text x="80" y="1295" class="note">Tool schemas are just JSON (~8-12KB total) - AI processes efficiently</text>
  <text x="80" y="1313" class="note">No difference in API response time whether 1 tool or 20 tools sent</text>
  
  <!-- Key Points -->
  <rect x="50" y="1370" width="1300" height="210" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="700" y="1405" class="label" font-size="14" text-anchor="middle">⭐ Key Technical Points</text>
  
  <text x="70" y="1440" class="note">• Tool schema describes function signature in JSON format</text>
  <text x="70" y="1460" class="note">• Description is CRITICAL - AI uses it to match user intent</text>
  <text x="70" y="1480" class="note">• Parameters define types, constraints, defaults, and requirements</text>
  <text x="70" y="1500" class="note">• ALL enabled tool schemas sent with EVERY request</text>
  <text x="70" y="1520" class="note">• AI autonomously decides which tools (if any) to use</text>
  <text x="70" y="1540" class="note">• Backend never pre-filters tools - AI has complete visibility</text>
  
</svg>
