<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1300" width="1400" height="1300">
  <defs>
    <style>
      .process { fill: #3b82f6; stroke: #1e40af; stroke-width: 2; }
      .database { fill: #ef4444; stroke: #dc2626; stroke-width: 2; }
      .api { fill: #10b981; stroke: #059669; stroke-width: 2; }
      .data { fill: #8b5cf6; stroke: #6d28d9; stroke-width: 2; }
      .text { fill: white; font-family: Arial, sans-serif; font-size: 13px; text-anchor: middle; font-weight: 600; }
      .small-text { fill: white; font-family: Arial, sans-serif; font-size: 10px; text-anchor: middle; }
      .title { fill: #1e293b; font-family: Arial, sans-serif; font-size: 26px; font-weight: bold; text-anchor: middle; }
      .label { fill: #1e293b; font-family: 'Courier New', monospace; font-size: 11px; }
      .code-text { fill: #1e293b; font-family: 'Courier New', monospace; font-size: 10px; }
      .note { fill: #475569; font-family: Arial, sans-serif; font-size: 10px; }
    </style>
  </defs>
  
  <text x="700" y="35" class="title">Detailed Tool Execution Process</text>
  <text x="700" y="60" class="note" text-anchor="middle">Complete Data Flow from Tool Call to Formatted Response</text>
  
  <!-- Step 1: Tool Call Received -->
  <rect x="450" y="90" width="500" height="90" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="700" y="115" class="label" font-weight="bold" text-anchor="middle">AI Returns Tool Call:</text>
  <text x="700" y="135" class="code-text" text-anchor="middle">{</text>
  <text x="700" y="150" class="code-text" text-anchor="middle">  "id": "call_abc123",</text>
  <text x="700" y="165" class="code-text" text-anchor="middle">  "function": {"name": "get_top_customers", "arguments": "{\"limit\":3,\"by\":\"revenue\"}"}}</text>
  <text x="700" y="180" class="code-text" text-anchor="middle">}</text>
  
  <line x1="700" y1="180" x2="700" y2="210" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Step 2: Parse -->
  <rect x="500" y="210" width="400" height="60" rx="8" class="process"/>
  <text x="700" y="235" class="text">1. Parse Tool Call</text>
  <text x="700" y="255" class="small-text">func_name = "get_top_customers"</text>
  <text x="700" y="268" class="small-text">args = json.loads(arguments)</text>
  
  <line x1="700" y1="270" x2="700" y2="300" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Step 3: Validate -->
  <rect x="500" y="300" width="400" height="60" rx="8" class="process"/>
  <text x="700" y="325" class="text">2. Validate Function Exists</text>
  <text x="700" y="345" class="small-text">Check: function in tool_registry</text>
  
  <text x="950" y="330" class="note">Validates against loaded tools</text>
  
  <line x1="700" y1="360" x2="700" y2="390" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Step 4: Route to Module -->
  <rect x="500" y="390" width="400" height="60" rx="8" class="api"/>
  <text x="700" y="415" class="text">3. Route to Tool Module</text>
  <text x="700" y="435" class="small-text">BaseTool.execute_tool(func_name, args)</text>
  
  <line x1="700" y1="450" x2="700" y2="480" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Module Selection -->
  <rect x="50" y="480" width="1300" height="180" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="700" y="505" class="label" font-size="14" text-anchor="middle" font-weight="bold">Tool Module Routing Logic:</text>
  
  <rect x="70" y="520" width="180" height="120" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="160" y="540" class="label" font-weight="bold" text-anchor="middle">CRMTools</text>
  <text x="80" y="560" class="note">• get_top_customers</text>
  <text x="80" y="577" class="note">• search_customers</text>
  <text x="80" y="594" class="note">• get_leads</text>
  <text x="80" y="611" class="note">• get_opportunities</text>
  <text x="80" y="628" class="note">→ CRM queries</text>
  
  <rect x="270" y="520" width="180" height="120" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="360" y="540" class="label" font-weight="bold" text-anchor="middle">SellingTools</text>
  <text x="280" y="560" class="note">• get_sales_orders</text>
  <text x="280" y="577" class="note">• get_quotations</text>
  <text x="280" y="594" class="note">• search_invoices</text>
  <text x="280" y="611" class="note">→ Sales queries</text>
  
  <rect x="470" y="520" width="180" height="120" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="560" y="540" class="label" font-weight="bold" text-anchor="middle">BuyingTools</text>
  <text x="480" y="560" class="note">• list_suppliers</text>
  <text x="480" y="577" class="note">• get_purchase_orders</text>
  <text x="480" y="594" class="note">→ Purchase queries</text>
  
  <rect x="670" y="520" width="180" height="120" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="760" y="540" class="label" font-weight="bold" text-anchor="middle">StockTools</text>
  <text x="680" y="560" class="note">• search_items</text>
  <text x="680" y="577" class="note">• get_stock_levels</text>
  <text x="680" y="594" class="note">→ Inventory queries</text>
  
  <rect x="870" y="520" width="180" height="120" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="960" y="540" class="label" font-weight="bold" text-anchor="middle">AccountTools</text>
  <text x="880" y="560" class="note">• get_profit_loss</text>
  <text x="880" y="577" class="note">• get_balance_sheet</text>
  <text x="880" y="594" class="note">→ Finance queries</text>
  
  <rect x="1070" y="520" width="180" height="120" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="1160" y="540" class="label" font-weight="bold" text-anchor="middle">HRMSTools</text>
  <text x="1080" y="560" class="note">• get_employees</text>
  <text x="1080" y="577" class="note">• get_leave_apps</text>
  <text x="1080" y="594" class="note">→ HR queries</text>
  
  <line x1="160" y1="640" x2="700" y2="680" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Step 5: Execute Function -->
  <rect x="500" y="680" width="400" height="70" rx="8" class="api"/>
  <text x="700" y="705" class="text">4. Execute Function</text>
  <text x="700" y="725" class="small-text">CRMTools.get_top_customers(</text>
  <text x="700" y="740" class="small-text">  limit=3, by="revenue")</text>
  
  <line x1="700" y1="750" x2="700" y2="780" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Step 6: Build Query -->
  <rect x="500" y="780" width="400" height="90" rx="8" class="database"/>
  <text x="700" y="805" class="text">5. Build Database Query</text>
  <text x="700" y="825" class="small-text">SQL Query Construction:</text>
  <text x="700" y="840" class="small-text">SELECT customer_name, SUM(grand_total)</text>
  <text x="700" y="855" class="small-text">FROM `tabSales Order` WHERE docstatus=1</text>
  <text x="700" y="870" class="small-text">GROUP BY customer_name ORDER BY SUM DESC LIMIT 3</text>
  
  <line x1="700" y1="870" x2="700" y2="900" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Step 7: Execute Query -->
  <rect x="500" y="900" width="400" height="60" rx="8" class="database"/>
  <text x="700" y="925" class="text">6. Execute on ERPNext DB</text>
  <text x="700" y="945" class="small-text">frappe.db.sql(query, as_dict=True)</text>
  
  <text x="950" y="930" class="note">MariaDB execution</text>
  
  <line x1="700" y1="960" x2="700" y2="990" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Step 8: Raw Data -->
  <rect x="400" y="990" width="600" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="700" y="1015" class="label" font-weight="bold" text-anchor="middle">7. Raw Data Retrieved:</text>
  <text x="700" y="1035" class="code-text" text-anchor="middle">[</text>
  <text x="700" y="1050" class="code-text" text-anchor="middle">  {"customer_name": "West View Software Ltd.", "total_revenue": 261000, "order_count": 2},</text>
  <text x="700" y="1065" class="code-text" text-anchor="middle">  {"customer_name": "Grant Plastics Ltd.", "total_revenue": 87000, "order_count": 2},</text>
  <text x="700" y="1080" class="code-text" text-anchor="middle">  {"customer_name": "Palmer Productions Ltd.", "total_revenue": 15000, "order_count": 1}</text>
  <text x="700" y="1095" class="code-text" text-anchor="middle">]</text>
  
  <line x1="700" y1="1110" x2="700" y2="1140" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Step 9: Format -->
  <rect x="500" y="1140" width="400" height="60" rx="8" class="data"/>
  <text x="700" y="1165" class="text">8. Format Tool Results</text>
  <text x="700" y="1185" class="small-text">return {"success": True, "data": results}</text>
  
  <line x1="700" y1="1200" x2="700" y2="1230" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Step 10: Second AI Call -->
  <rect x="500" y="1230" width="400" height="60" rx="8" class="api"/>
  <text x="700" y="1255" class="text">9. Second AI Call</text>
  <text x="700" y="1275" class="small-text">Format results into natural language</text>
  
  <!-- Final Result Box -->
  <rect x="100" y="50" width="280" height="210" rx="8" fill="#dcfce7" stroke="#10b981" stroke-width="3"/>
  <text x="240" y="75" class="label" font-weight="bold" text-anchor="middle">Final Formatted Response:</text>
  <rect x="110" y="85" width="260" height="165" rx="5" fill="white" stroke="#10b981" stroke-width="1"/>
  <text x="120" y="105" class="code-text">"Here are your top 3 customers</text>
  <text x="120" y="120" class="code-text">by revenue:</text>
  <text x="120" y="140" class="code-text">1. West View Software Ltd.</text>
  <text x="130" y="155" class="code-text">Revenue: $261,000</text>
  <text x="130" y="170" class="code-text">Orders: 2</text>
  <text x="120" y="190" class="code-text">2. Grant Plastics Ltd.</text>
  <text x="130" y="205" class="code-text">Revenue: $87,000</text>
  <text x="130" y="220" class="code-text">Orders: 2</text>
  <text x="120" y="240" class="code-text">3. Palmer Productions Ltd.</text>
  
  <!-- Performance Metrics Box -->
  <rect x="1020" y="50" width="330" height="210" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="1185" y="75" class="label" font-weight="bold" text-anchor="middle">Execution Metrics:</text>
  
  <text x="1040" y="105" class="label">Time Breakdown:</text>
  <text x="1050" y="125" class="note">• Parse tool call: ~50ms</text>
  <text x="1050" y="142" class="note">• Route to module: ~20ms</text>
  <text x="1050" y="159" class="note">• Database query: ~500-800ms</text>
  <text x="1050" y="176" class="note">• Second AI call: ~1000-1500ms</text>
  <text x="1050" y="193" class="note">• Format and save: ~100ms</text>
  
  <text x="1040" y="218" class="label" font-weight="bold">Total: 1.7-2.5 seconds</text>
  
  <text x="1040" y="243" class="note">(Plus initial AI call: ~1-2s)</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#475569"/>
    </marker>
  </defs>
</svg>
