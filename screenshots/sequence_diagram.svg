<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1600" width="1400" height="1600">
  <defs>
    <style>
      .component { fill: #1e40af; stroke: #1e3a8a; stroke-width: 2; }
      .lifeline { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 5,5; }
      .call { stroke: #1e40af; stroke-width: 2; marker-end: url(#arrow); }
      .return { stroke: #64748b; stroke-width: 2; stroke-dasharray: 5,3; marker-end: url(#arrow-return); }
      .activation { fill: #dbeafe; stroke: #3b82f6; stroke-width: 1; }
      .text { fill: white; font-family: 'Courier New', monospace; font-size: 12px; text-anchor: middle; font-weight: bold; }
      .small-text { fill: white; font-family: 'Courier New', monospace; font-size: 10px; text-anchor: middle; }
      .title { fill: #1e293b; font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; text-anchor: middle; }
      .label { fill: #1e293b; font-family: 'Courier New', monospace; font-size: 11px; }
      .note { fill: #475569; font-family: Arial, sans-serif; font-size: 10px; }
      .code-label { fill: #dc2626; font-family: 'Courier New', monospace; font-size: 10px; }
    </style>
  </defs>
  
  <text x="700" y="30" class="title">Detailed Technical Sequence - Message Flow</text>
  <text x="700" y="55" class="note" text-anchor="middle">Complete Function Call Stack with Parameters</text>
  
  <!-- Components -->
  <rect x="80" y="80" width="140" height="45" rx="5" class="component"/>
  <text x="150" y="100" class="text">User</text>
  <text x="150" y="115" class="small-text">Browser</text>
  
  <rect x="260" y="80" width="140" height="45" rx="5" class="component"/>
  <text x="330" y="100" class="text">Vue Frontend</text>
  <text x="330" y="115" class="small-text">ChatInterface.vue</text>
  
  <rect x="440" y="80" width="140" height="45" rx="5" class="component"/>
  <text x="510" y="100" class="text">API Layer</text>
  <text x="510" y="115" class="small-text">chat.py</text>
  
  <rect x="620" y="80" width="140" height="45" rx="5" class="component"/>
  <text x="690" y="100" class="text">Database</text>
  <text x="690" y="115" class="small-text">MariaDB</text>
  
  <rect x="800" y="80" width="140" height="45" rx="5" class="component"/>
  <text x="870" y="100" class="text">AI Provider</text>
  <text x="870" y="115" class="small-text">OpenAI API</text>
  
  <rect x="980" y="80" width="140" height="45" rx="5" class="component"/>
  <text x="1050" y="100" class="text">Tool Layer</text>
  <text x="1050" y="115" class="small-text">BaseTool</text>
  
  <rect x="1160" y="80" width="140" height="45" rx="5" class="component"/>
  <text x="1230" y="100" class="text">ERPNext</text>
  <text x="1230" y="115" class="small-text">frappe.db</text>
  
  <!-- Lifelines -->
  <line x1="150" y1="125" x2="150" y2="1550" class="lifeline"/>
  <line x1="330" y1="125" x2="330" y2="1550" class="lifeline"/>
  <line x1="510" y1="125" x2="510" y2="1550" class="lifeline"/>
  <line x1="690" y1="125" x2="690" y2="1550" class="lifeline"/>
  <line x1="870" y1="125" x2="870" y2="1550" class="lifeline"/>
  <line x1="1050" y1="125" x2="1050" y2="1550" class="lifeline"/>
  <line x1="1230" y1="125" x2="1230" y2="1550" class="lifeline"/>
  
  <!-- Interaction 1: User clicks -->
  <line x1="150" y1="160" x2="330" y2="160" class="call"/>
  <text x="240" y="155" class="label">onClick()</text>
  <rect x="320" y="160" width="20" height="40" class="activation"/>
  
  <!-- Interaction 2: Validate and prepare -->
  <line x1="330" y1="180" x2="330" y2="200" class="call"/>
  <text x="345" y="190" class="label" text-anchor="start">validateInput()</text>
  
  <!-- Interaction 3: API call -->
  <line x1="330" y1="220" x2="510" y2="220" class="call"/>
  <text x="420" y="215" class="label">POST /api/method/</text>
  <text x="420" y="228" class="code-label">ai_chatbot.api.chat.send_message</text>
  <rect x="500" y="220" width="20" height="850" class="activation"/>
  
  <!-- Interaction 4: Validate conversation -->
  <line x1="510" y1="250" x2="510" y2="270" class="call"/>
  <text x="525" y="260" class="label" text-anchor="start">frappe.get_doc()</text>
  <text x="525" y="273" class="code-label" text-anchor="start">validate_user()</text>
  
  <!-- Interaction 5: Save user message -->
  <line x1="510" y1="290" x2="690" y2="290" class="call"/>
  <text x="600" y="285" class="label">INSERT INTO</text>
  <text x="600" y="298" class="code-label">`tabChatbot Message`</text>
  <rect x="680" y="290" width="20" height="35" class="activation"/>
  <line x1="690" y1="325" x2="510" y2="325" class="return"/>
  <text x="600" y="338" class="label">message_id</text>
  
  <!-- Interaction 6: Get history -->
  <line x1="510" y1="350" x2="690" y2="350" class="call"/>
  <text x="600" y="345" class="label">get_conversation_history()</text>
  <rect x="680" y="350" width="20" height="40" class="activation"/>
  <line x1="690" y1="370" x2="690" y2="380" class="call"/>
  <text x="705" y="375" class="code-label" text-anchor="start">SELECT * FROM</text>
  <line x1="690" y1="390" x2="510" y2="390" class="return"/>
  <text x="600" y="403" class="label">history[]</text>
  
  <!-- Interaction 7: Get AI provider -->
  <line x1="510" y1="420" x2="510" y2="440" class="call"/>
  <text x="525" y="430" class="label" text-anchor="start">get_ai_provider()</text>
  <text x="525" y="443" class="code-label" text-anchor="start">OpenAIProvider(api_key)</text>
  
  <!-- Interaction 8: Get tools schema -->
  <line x1="510" y1="460" x2="1050" y2="460" class="call"/>
  <text x="780" y="455" class="label">get_all_tools_schema()</text>
  <rect x="1040" y="460" width="20" height="50" class="activation"/>
  <line x1="1050" y1="490" x2="1050" y2="500" class="call"/>
  <text x="1065" y="495" class="code-label" text-anchor="start">load CRMTools</text>
  <line x1="1050" y1="510" x2="510" y2="510" class="return"/>
  <text x="780" y="523" class="label">tools_schema[]</text>
  
  <!-- Interaction 9: Call AI with tools -->
  <line x1="510" y1="540" x2="870" y2="540" class="call"/>
  <text x="690" y="535" class="label">chat_completion()</text>
  <text x="690" y="548" class="code-label">messages, tools, temp=0.7</text>
  <rect x="860" y="540" width="20" height="400" class="activation"/>
  
  <!-- AI processing note -->
  <rect x="890" y="570" width="200" height="70" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="990" y="590" class="label" text-anchor="middle" font-weight="bold">AI Processing</text>
  <text x="900" y="608" class="note">• Analyze message</text>
  <text x="900" y="623" class="note">• Check tools available</text>
  <text x="900" y="638" class="note">• Decide: use tools?</text>
  
  <!-- Interaction 10: AI returns tool call -->
  <line x1="870" y1="660" x2="510" y2="660" class="return"/>
  <text x="690" y="655" class="label">response</text>
  <text x="690" y="668" class="code-label">tool_calls: [...]</text>
  
  <!-- Interaction 11: Parse tool call -->
  <line x1="510" y1="690" x2="510" y2="710" class="call"/>
  <text x="525" y="700" class="label" text-anchor="start">parse tool_calls</text>
  <text x="525" y="713" class="code-label" text-anchor="start">json.loads()</text>
  
  <!-- Interaction 12: Execute tool -->
  <line x1="510" y1="730" x2="1050" y2="730" class="call"/>
  <text x="780" y="725" class="label">BaseTool.execute_tool()</text>
  <text x="780" y="738" class="code-label">"get_top_customers", {limit:3}</text>
  <rect x="1040" y="730" width="20" height="120" class="activation"/>
  
  <!-- Interaction 13: Tool queries ERPNext -->
  <line x1="1050" y1="760" x2="1230" y2="760" class="call"/>
  <text x="1140" y="755" class="label">frappe.db.sql()</text>
  <rect x="1220" y="760" width="20" height="50" class="activation"/>
  <line x1="1230" y1="790" x2="1230" y2="800" class="call"/>
  <text x="1245" y="795" class="code-label" text-anchor="start">SELECT FROM</text>
  
  <!-- Interaction 14: Return data -->
  <line x1="1230" y1="810" x2="1050" y2="810" class="return"/>
  <text x="1140" y="823" class="label">customer_data[]</text>
  
  <!-- Interaction 15: Format and return -->
  <line x1="1050" y1="840" x2="1050" y2="850" class="call"/>
  <text x="1065" y="845" class="code-label" text-anchor="start">format_results()</text>
  <line x1="1050" y1="850" x2="510" y2="850" class="return"/>
  <text x="780" y="863" class="label">tool_results</text>
  
  <!-- Interaction 16: Second AI call -->
  <line x1="510" y1="880" x2="870" y2="880" class="call"/>
  <text x="690" y="875" class="label">chat_completion()</text>
  <text x="690" y="888" class="code-label">history + tool_results</text>
  
  <!-- Interaction 17: AI formats response -->
  <line x1="870" y1="920" x2="870" y2="930" class="call"/>
  <text x="885" y="925" class="code-label" text-anchor="start">format to natural language</text>
  
  <!-- Interaction 18: Return formatted -->
  <line x1="870" y1="940" x2="510" y2="940" class="return"/>
  <text x="690" y="953" class="label">final_response</text>
  
  <!-- Interaction 19: Save assistant message -->
  <line x1="510" y1="970" x2="690" y2="970" class="call"/>
  <text x="600" y="965" class="label">INSERT INTO</text>
  <text x="600" y="978" class="code-label">`tabChatbot Message`</text>
  <rect x="680" y="970" width="20" height="40" class="activation"/>
  <line x1="690" y1="990" x2="690" y2="1000" class="call"/>
  <text x="705" y="995" class="code-label" text-anchor="start">+ tool_calls JSON</text>
  <line x1="690" y1="1010" x2="510" y2="1010" class="return"/>
  
  <!-- Interaction 20: Update conversation -->
  <line x1="510" y1="1040" x2="690" y2="1040" class="call"/>
  <text x="600" y="1035" class="label">UPDATE</text>
  <text x="600" y="1048" class="code-label">message_count++</text>
  <rect x="680" y="1040" width="20" height="30" class="activation"/>
  <line x1="690" y1="1070" x2="510" y2="1070" class="return"/>
  
  <!-- Interaction 21: Return to frontend -->
  <line x1="510" y1="1100" x2="330" y2="1100" class="return"/>
  <text x="420" y="1095" class="label">response_data</text>
  <text x="420" y="1108" class="code-label">{success, message, tokens}</text>
  
  <!-- Interaction 22: Update UI -->
  <line x1="330" y1="1130" x2="330" y2="1150" class="call"/>
  <text x="345" y="1140" class="label" text-anchor="start">renderMessage()</text>
  <text x="345" y="1153" class="code-label" text-anchor="start">parseMarkdown()</text>
  
  <!-- Interaction 23: Display tool badge -->
  <line x1="330" y1="1170" x2="330" y2="1190" class="call"/>
  <text x="345" y="1180" class="label" text-anchor="start">displayToolBadge()</text>
  <text x="345" y="1193" class="code-label" text-anchor="start">formatToolName()</text>
  
  <!-- Interaction 24: Return to user -->
  <line x1="330" y1="1210" x2="150" y2="1210" class="return"/>
  <text x="240" y="1223" class="label">Display complete</text>
  
  <!-- Alternative flow note -->
  <rect x="100" y="1260" width="1200" height="260" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="3"/>
  <text x="700" y="1285" class="label" font-size="14" text-anchor="middle" font-weight="bold">Alternative Flow: Simple Message (No Tools)</text>
  
  <text x="120" y="1315" class="label">User sends: "Hello"</text>
  
  <text x="120" y="1345" class="label" font-weight="bold">Steps 1-8: SAME</text>
  <text x="130" y="1365" class="note">→ validate, save, get history, load tools, call AI</text>
  
  <text x="120" y="1395" class="label" font-weight="bold">Step 9: AI Decision Different</text>
  <text x="130" y="1415" class="note">→ AI analyzes: "Hello" = greeting, no tools needed</text>
  <text x="130" y="1433" class="note">→ Returns: {content: "Hi! How can I help?", tool_calls: null}</text>
  
  <text x="120" y="1463" class="label" font-weight="bold">Steps 10-15: SKIPPED</text>
  <text x="130" y="1483" class="note">→ No tool execution, no second AI call</text>
  
  <text x="120" y="1513" class="label" font-weight="bold">Steps 16-24: SIMPLIFIED</text>
  <text x="130" y="1533" class="note">→ Save message (tool_calls = null), display (no badge), faster (1-2s vs 3-5s)</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1e40af"/>
    </marker>
    <marker id="arrow-return" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>
</svg>
