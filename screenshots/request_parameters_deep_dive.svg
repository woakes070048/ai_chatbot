<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 2400" width="1800" height="2400">
  <defs>
    <style>
      .param-box { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; }
      .example-box { fill: #dcfce7; stroke: #059669; stroke-width: 2; }
      .note-box { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; }
      .code { fill: #1e293b; font-family: 'Courier New', monospace; font-size: 9px; }
      .title { fill: #1e293b; font-family: Arial, sans-serif; font-size: 26px; font-weight: bold; text-anchor: middle; }
      .label { fill: #1e293b; font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; }
      .note { fill: #475569; font-family: Arial, sans-serif; font-size: 10px; }
    </style>
  </defs>
  
  <text x="900" y="40" class="title">Request Parameters Deep-Dive: Messages, IDs, Tokens, Temperature</text>
  
  <!-- Messages Role Section -->
  <rect x="50" y="80" width="850" height="450" rx="8" class="param-box"/>
  <text x="70" y="110" class="label" font-size="16">Messages Role in AI Request</text>
  
  <text x="70" y="145" class="label">What are Messages?</text>
  <text x="80" y="165" class="note">An ordered array of conversation turns, each with a specific role.</text>
  
  <text x="70" y="195" class="label">Four Message Roles:</text>
  
  <!-- System Role -->
  <rect x="80" y="210" width="800" height="50" rx="4" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
  <text x="90" y="230" class="label">1. system - Instructions to AI</text>
  <text x="100" y="248" class="code">{"role": "system", "content": "You are a helpful ERPNext assistant..."}</text>
  
  <!-- User Role -->
  <rect x="80" y="270" width="800" height="50" rx="4" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
  <text x="90" y="290" class="label">2. user - Human messages</text>
  <text x="100" y="308" class="code">{"role": "user", "content": "Get top 3 customers by revenue"}</text>
  
  <!-- Assistant Role -->
  <rect x="80" y="330" width="800" height="70" rx="4" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
  <text x="90" y="350" class="label">3. assistant - AI responses</text>
  <text x="100" y="368" class="code">{"role": "assistant", "content": "Here are your top customers..."}</text>
  <text x="100" y="383" class="code">// OR when using tools:</text>
  <text x="100" y="398" class="code">{"role": "assistant", "content": null, "tool_calls": [...]}</text>
  
  <!-- Tool Role -->
  <rect x="80" y="410" width="800" height="110" rx="4" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
  <text x="90" y="430" class="label">4. tool - Tool execution results</text>
  <text x="100" y="448" class="code">{</text>
  <text x="110" y="463" class="code">  "role": "tool",</text>
  <text x="110" y="478" class="code">  "tool_call_id": "call_abc123",  // Links to assistant's tool_call</text>
  <text x="110" y="493" class="code">  "name": "get_top_customers",</text>
  <text x="110" y="508" class="code">  "content": "{\"success\":true,\"data\":[...]}"  // JSON string</text>
  <text x="100" y="523" class="code">}</text>
  
  <!-- tool_call_id Section -->
  <rect x="950" y="80" width="800" height="450" rx="8" class="example-box"/>
  <text x="970" y="110" class="label" font-size="16">tool_call_id: Linking Tool Calls and Results</text>
  
  <text x="970" y="145" class="label">What is tool_call_id?</text>
  <text x="980" y="165" class="note">A unique identifier that links a tool result back to the original tool call request.</text>
  
  <text x="970" y="195" class="label">Who Generates It?</text>
  <text x="980" y="215" class="note">The AI provider (OpenAI/Claude) generates it - NOT our backend.</text>
  
  <text x="970" y="245" class="label">Flow Example:</text>
  
  <rect x="980" y="260" width="750" height="250" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  
  <text x="990" y="285" class="code">// Step 1: AI Returns Tool Call WITH ID</text>
  <text x="990" y="303" class="code">{</text>
  <text x="1000" y="318" class="code">  "role": "assistant",</text>
  <text x="1000" y="333" class="code">  "tool_calls": [{</text>
  <text x="1010" y="348" class="code">    "id": "call_9K8H7G6F5D4S",  // ← AI generates this</text>
  <text x="1010" y="363" class="code">    "type": "function",</text>
  <text x="1010" y="378" class="code">    "function": {"name": "get_top_customers", ...}</text>
  <text x="1000" y="393" class="code">  }]</text>
  <text x="990" y="408" class="code">}</text>
  
  <text x="990" y="433" class="code">// Step 2: Backend Executes Tool (queries database)</text>
  <text x="990" y="448" class="code">// Step 3: Backend Returns Result WITH SAME ID</text>
  <text x="990" y="466" class="code">{</text>
  <text x="1000" y="481" class="code">  "role": "tool",</text>
  <text x="1000" y="496" class="code">  "tool_call_id": "call_9K8H7G6F5D4S",  // ← Must match!</text>
  <text x="1000" y="511" class="code">  "content": "{...}"</text>
  <text x="990" y="526" class="code">}</text>
  
  <!-- Temperature Section -->
  <rect x="50" y="560" width="850" height="450" rx="8" class="note-box"/>
  <text x="70" y="590" class="label" font-size="16">Temperature: Controlling AI Randomness</text>
  
  <text x="70" y="625" class="label">What is Temperature?</text>
  <text x="80" y="645" class="note">A parameter (0.0 to 2.0) controlling randomness in AI responses.</text>
  
  <text x="70" y="675" class="label">Scale and Behavior:</text>
  
  <rect x="80" y="690" width="750" height="300" rx="4" fill="#fffbeb" stroke="#fbbf24" stroke-width="1"/>
  
  <text x="90" y="715" class="label">Temperature 0.0 (Deterministic)</text>
  <text x="100" y="733" class="note">• Always picks most likely token</text>
  <text x="100" y="748" class="note">• Consistent, predictable responses</text>
  <text x="100" y="763" class="note">• Good for: factual data, mathematical answers</text>
  <text x="100" y="778" class="code">Same input → Same output (every time)</text>
  
  <text x="90" y="808" class="label">Temperature 0.7 (Balanced) ← OUR DEFAULT</text>
  <text x="100" y="826" class="note">• Balanced creativity and consistency</text>
  <text x="100" y="841" class="note">• Natural conversation with some variation</text>
  <text x="100" y="856" class="note">• Good for: chatbots, customer service</text>
  <text x="100" y="871" class="code">Same input → Similar but slightly different outputs</text>
  
  <text x="90" y="901" class="label">Temperature 1.5-2.0 (Creative)</text>
  <text x="100" y="919" class="note">• High randomness, very creative</text>
  <text x="100" y="934" class="note">• Unpredictable, sometimes incoherent</text>
  <text x="100" y="949" class="note">• Good for: creative writing, brainstorming</text>
  <text x="100" y="964" class="code">Same input → Very different outputs</text>
  
  <!-- Tokens Section -->
  <rect x="950" y="560" width="800" height="850" rx="8" class="param-box"/>
  <text x="970" y="590" class="label" font-size="16">Tokens and max_tokens: Understanding AI Currency</text>
  
  <text x="970" y="625" class="label">What are Tokens?</text>
  <text x="980" y="645" class="note">Pieces of text that AI models process. Roughly:</text>
  <text x="990" y="665" class="code">1 token ≈ 4 characters ≈ ¾ of a word</text>
  
  <text x="970" y="695" class="label">Token Examples:</text>
  
  <rect x="980" y="710" width="750" height="170" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="990" y="735" class="code">"Hello" = 1 token</text>
  <text x="990" y="753" class="code">"Hello, how are you?" = 6 tokens</text>
  <text x="990" y="771" class="code">"The quick brown fox jumps" = 5 tokens</text>
  <text x="990" y="789" class="code">"GPT-4" = 2 tokens (G, PT, -, 4)</text>
  <text x="990" y="807" class="code">"{\"customer\":\"ABC\"}" = 7 tokens</text>
  <text x="990" y="825" class="code">"supercalifragilisticexpialidocious" = 6 tokens</text>
  <text x="990" y="843" class="note">Longer/rarer words = more tokens</text>
  <text x="990" y="861" class="note">Common words = fewer tokens</text>
  
  <text x="970" y="895" class="label">Three Token Types in API Response:</text>
  
  <rect x="980" y="910" width="750" height="230" rx="4" fill="#f0fdf4" stroke="#10b981" stroke-width="1"/>
  
  <text x="990" y="935" class="label">1. prompt_tokens (Input)</text>
  <text x="1000" y="953" class="note">• Everything sent TO the AI</text>
  <text x="1000" y="968" class="code">  - All messages in history</text>
  <text x="1000" y="983" class="code">  - Tool schemas (ALL 25 tools)</text>
  <text x="1000" y="998" class="code">  - System instructions</text>
  <text x="1000" y="1013" class="code">  - Tool results (if second call)</text>
  
  <text x="990" y="1043" class="label">2. completion_tokens (Output)</text>
  <text x="1000" y="1061" class="note">• Everything AI generates</text>
  <text x="1000" y="1076" class="code">  - Response text</text>
  <text x="1000" y="1091" class="code">  - Tool call JSON</text>
  <text x="1000" y="1106" class="code">  - Reasoning tokens</text>
  
  <text x="990" y="1136" class="label">3. total_tokens = prompt + completion</text>
  
  <text x="970" y="1165" class="label">Why max_tokens Parameter?</text>
  
  <rect x="980" y="1180" width="750" height="210" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="990" y="1205" class="code">max_tokens = 4000  // Our setting</text>
  
  <text x="990" y="1230" class="label">Purpose:</text>
  <text x="1000" y="1248" class="note">✓ Cost Control - Prevents unexpectedly long (expensive) responses</text>
  <text x="1000" y="1263" class="note">✓ API Limits - GPT-4 has context window limits</text>
  <text x="1000" y="1278" class="note">✓ User Experience - Prevents overwhelming walls of text</text>
  <text x="1000" y="1293" class="note">✓ Response Time - Longer responses = more latency</text>
  
  <text x="990" y="1318" class="note">If AI reaches max_tokens, response gets cut off</text>
  <text x="990" y="1333" class="note">Our 4000 limit allows ~3000 words - sufficient for most responses</text>
  
  <!-- Tool Parameters Section -->
  <rect x="50" y="1040" width="850" height="700" rx="8" class="example-box"/>
  <text x="70" y="1070" class="label" font-size="16">Tool Parameters: How AI Derives Values</text>
  
  <text x="70" y="1105" class="label">Parameter Derivation Process:</text>
  
  <rect x="80" y="1120" width="750" height="600" rx="4" fill="#f0fdf4" stroke="#059669" stroke-width="1"/>
  
  <text x="90" y="1145" class="label">Example: "Get top 5 commercial customers by revenue from Q4"</text>
  
  <text x="90" y="1175" class="code">// Step 1: Identify Function</text>
  <text x="90" y="1190" class="code">Match: get_top_customers</text>
  
  <text x="90" y="1215" class="code">// Step 2: Parse Message for Parameter Indicators</text>
  
  <rect x="100" y="1225" width="710" height="180" fill="#ffffff" stroke="#10b981" stroke-width="1"/>
  <text x="110" y="1248" class="code">"top 5" → Indicates limit parameter</text>
  <text x="120" y="1263" class="code">Extract number: 5</text>
  <text x="120" y="1278" class="code">Parameter: limit = 5</text>
  
  <text x="110" y="1303" class="code">"commercial customers" → Indicates customer_group parameter</text>
  <text x="120" y="1318" class="code">Extract group: "commercial"</text>
  <text x="120" y="1333" class="code">Capitalize: "Commercial"</text>
  <text x="120" y="1348" class="code">Parameter: customer_group = "Commercial"</text>
  
  <text x="110" y="1373" class="code">"by revenue" → Indicates sorting parameter</text>
  <text x="120" y="1388" class="code">Match enum value: "revenue"</text>
  <text x="120" y="1403" class="code">Parameter: by = "revenue"</text>
  
  <text x="90" y="1430" class="code">// Step 3: Complex Date Extraction</text>
  
  <rect x="100" y="1440" width="710" height="145" fill="#ffffff" stroke="#10b981" stroke-width="1"/>
  <text x="110" y="1463" class="code">"from Q4" → Requires date calculation</text>
  <text x="120" y="1478" class="code">Current date: 2026-02-03</text>
  <text x="120" y="1493" class="code">Q4 = October-December</text>
  <text x="120" y="1508" class="code">Previous Q4: 2025-10-01 to 2025-12-31</text>
  <text x="120" y="1523" class="code">Parameter: from_date = "2025-10-01"</text>
  <text x="120" y="1538" class="code">Parameter: to_date = "2025-12-31"</text>
  
  <text x="90" y="1605" class="code">// Step 4: Generate Final JSON</text>
  <text x="90" y="1623" class="code">{</text>
  <text x="100" y="1638" class="code">  "limit": 5,</text>
  <text x="100" y="1653" class="code">  "by": "revenue",</text>
  <text x="100" y="1668" class="code">  "customer_group": "Commercial",</text>
  <text x="100" y="1683" class="code">  "from_date": "2025-10-01",</text>
  <text x="100" y="1698" class="code">  "to_date": "2025-12-31"</text>
  <text x="90" y="1713" class="code">}</text>
  
  <!-- AI Intelligence Examples -->
  <rect x="50" y="1770" width="1700" height="300" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="3"/>
  <text x="900" y="1805" class="label" font-size="16" text-anchor="middle">AI's Intelligence in Parameter Extraction</text>
  
  <text x="70" y="1840" class="label">Implicit Understanding:</text>
  
  <rect x="80" y="1855" width="800" height="190" fill="#faf5ff" stroke="#a78bfa" stroke-width="1"/>
  <text x="90" y="1880" class="code">User: "Show me VIP customers"</text>
  <text x="100" y="1900" class="note">AI recognizes:</text>
  <text x="110" y="1918" class="code">• "VIP" is NOT a parameter value</text>
  <text x="110" y="1933" class="code">• "VIP" implies high value/revenue</text>
  <text x="110" y="1948" class="code">• Maps to: get_top_customers(by="revenue")</text>
  <text x="110" y="1963" class="code">• Does NOT try customer_group="VIP" (invalid)</text>
  
  <text x="100" y="1988" class="label">→ Uses intent, not literal text</text>
  <text x="100" y="2008" class="note">→ Understands business context</text>
  <text x="100" y="2023" class="note">→ Avoids invalid parameter combinations</text>
  
  <rect x="920" y="1855" width="800" height="190" fill="#faf5ff" stroke="#a78bfa" stroke-width="1"/>
  <text x="930" y="1880" class="code">User: "best sellers last year"</text>
  <text x="940" y="1900" class="note">AI recognizes:</text>
  <text x="950" y="1918" class="code">• "best sellers" → top items by sales</text>
  <text x="950" y="1933" class="code">• "last year" → calculate date range</text>
  <text x="950" y="1948" class="code">• Current: 2026-02-03</text>
  <text x="950" y="1963" class="code">• Last year: 2025-01-01 to 2025-12-31</text>
  
  <text x="940" y="1988" class="label">→ Temporal reasoning</text>
  <text x="940" y="2008" class="note">→ Date arithmetic</text>
  <text x="940" y="2023" class="note">→ Context-aware extraction</text>
  
  <!-- Key Takeaways -->
  <rect x="50" y="2100" width="1700" height="270" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="3"/>
  <text x="900" y="2135" class="label" font-size="16" text-anchor="middle">⭐ Key Technical Points</text>
  
  <text x="70" y="2175" class="note">• Messages array maintains complete conversation context with role-based structure</text>
  <text x="70" y="2195" class="note">• tool_call_id is generated by AI provider (not backend) to link requests and responses</text>
  <text x="70" y="2215" class="note">• Temperature (0.0-2.0) controls randomness: 0.7 is our balanced default for chatbots</text>
  <text x="70" y="2235" class="note">• Tokens are AI's processing units: ~4 chars each, used for cost calculation</text>
  <text x="70" y="2255" class="note">• max_tokens prevents excessively long responses (cost control + UX)</text>
  <text x="70" y="2275" class="note">• AI extracts parameters using NLP: numbers, enums, dates, intent understanding</text>
  <text x="70" y="2295" class="note">• Prompt tokens (input) cost less than completion tokens (output) - typically 1:3 ratio</text>
  <text x="70" y="2315" class="note">• AI demonstrates contextual intelligence: synonyms, temporal reasoning, business logic</text>
  <text x="70" y="2335" class="note">• Tool parameters can come from explicit mentions, implicit intent, or calculated values</text>
  
</svg>
