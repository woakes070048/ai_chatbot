<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4fd1c5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38b2ac;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.1" />
    </linearGradient>
    <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#667eea" flood-opacity="0.4"/>
    </filter>
    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle with glow -->
  <circle cx="100" cy="100" r="95" fill="url(#glowGrad)" opacity="0.5"/>
  
  <!-- Main circle -->
  <circle cx="100" cy="100" r="85" fill="url(#logoGrad1)" filter="url(#logoShadow)"/>
  
  <!-- Inner decoration ring -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="white" stroke-width="2" opacity="0.2"/>
  
  <!-- Chat bubble base -->
  <g transform="translate(100, 100)">
    <!-- Main bubble -->
    <path d="M -35 -30 
             Q -35 -45, -20 -45 
             L 20 -45 
             Q 35 -45, 35 -30 
             L 35 10 
             Q 35 25, 20 25 
             L -5 25 
             L -20 40 
             L -15 25 
             L -20 25 
             Q -35 25, -35 10 
             Z" 
          fill="white" 
          opacity="0.95"
          filter="url(#innerGlow)"/>
    
    <!-- AI Brain/Circuit pattern inside bubble -->
    <g transform="translate(0, -8)">
      <!-- Central node -->
      <circle cx="0" cy="0" r="8" fill="url(#logoGrad1)"/>
      <circle cx="0" cy="0" r="4" fill="white"/>
      
      <!-- Connection lines -->
      <line x1="0" y1="0" x2="-18" y2="-12" stroke="url(#logoGrad1)" stroke-width="2" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="18" y2="-12" stroke="url(#logoGrad1)" stroke-width="2" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="-18" y2="12" stroke="url(#logoGrad1)" stroke-width="2" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="18" y2="12" stroke="url(#logoGrad1)" stroke-width="2" stroke-linecap="round"/>
      
      <!-- Outer nodes -->
      <circle cx="-18" cy="-12" r="5" fill="url(#logoGrad2)"/>
      <circle cx="18" cy="-12" r="5" fill="url(#logoGrad2)"/>
      <circle cx="-18" cy="12" r="5" fill="url(#logoGrad2)"/>
      <circle cx="18" cy="12" r="5" fill="url(#logoGrad2)"/>
      
      <!-- Small decorative dots -->
      <circle cx="-18" cy="-12" r="2" fill="white"/>
      <circle cx="18" cy="-12" r="2" fill="white"/>
      <circle cx="-18" cy="12" r="2" fill="white"/>
      <circle cx="18" cy="12" r="2" fill="white"/>
    </g>
  </g>
  
  <!-- Decorative particles -->
  <circle cx="45" cy="55" r="4" fill="white" opacity="0.6"/>
  <circle cx="160" cy="70" r="3" fill="white" opacity="0.5"/>
  <circle cx="150" cy="145" r="5" fill="white" opacity="0.4"/>
  <circle cx="55" cy="150" r="3" fill="white" opacity="0.5"/>
  
  <!-- Subtle outer ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
</svg>
